name: Release

# release-please (manifest mode) + npm OIDC trusted publishing.
# Pushes to main open/update a combined "release PR" that bumps each changed
# package + CHANGELOG from Conventional Commits. Merging that PR creates
# per-package tags + GitHub Releases; this workflow then publishes each released
# package to npm via OIDC (no NPM_TOKEN, provenance automatic).
#
# Each @knowvah/* package has a trusted publisher on npmjs.com pinned to repo
# knowvah/dot-plugins, workflow file `release.yml`, environment `release`.
# DO NOT rename this file or change the environment, or the publishers break.
on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # OIDC trusted publishing + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v7

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

      # The steps below run only when a release PR was merged (releases cut).
      - uses: pnpm/action-setup@v6
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        with:
          version: 10

      - uses: actions/setup-node@v7
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      # Trusted publishing (OIDC) requires npm >= 11.5.1.
      - if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: npm install -g npm@latest

      - if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: pnpm install --frozen-lockfile

      - if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: pnpm -r build

      # Publish each released package: `pnpm pack` rewrites workspace:* to real
      # versions; npm (>=11.5.1) uploads the tarball with OIDC + provenance.
      - if: ${{ steps.release.outputs.releases_created == 'true' }}
        env:
          PATHS_RELEASED: ${{ steps.release.outputs.paths_released }}
        run: |
          set -euo pipefail
          echo "$PATHS_RELEASED" | jq -r '.[]' | while read -r pkgdir; do
            echo "==> packing $pkgdir"
            tgz="$(cd "$pkgdir" && pnpm pack --pack-destination "$RUNNER_TEMP" | tail -1)"
            echo "==> publishing $tgz"
            npm publish "$tgz" --provenance --access public
          done
