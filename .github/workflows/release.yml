name: Release

# Changesets + npm Trusted Publishing (OIDC). Pushes to main open/update a
# "Version Packages" PR that bumps versions + changelogs from the .changeset/
# entries; merging it publishes the changed packages to npm via OIDC — no
# long-lived NPM_TOKEN. Each @knowvah/* package needs a trusted publisher
# configured on npmjs.com: repo knowvah/dot-plugins, workflow release.yml,
# environment "release". npm publishes provenance attestations automatically.
on:
  push:
    branches:
      - main

concurrency: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      pull-requests: write
      id-token: write # OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      # Trusted publishing (OIDC) requires npm >= 11.5.1.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      # Build first: adapter packages resolve @knowvah/dot-core's types via its
      # exports -> dist/*.d.ts, which don't exist on a clean checkout. Typecheck
      # before build fails with "Cannot find module '@knowvah/dot-core'".
      - run: pnpm -r build

      - run: pnpm -r typecheck && pnpm -r test
        env:
          GV_FONT_QUIET: '1'
          GV_TEXT_MEASURER: estimate

      - uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
